{% if resume.languages %}
<section id="languages" class="resume-section" aria-labelledby="languages-heading">
    <h2 id="languages-heading">Idiomas</h2>
    <ul class="item">
        {% for item in resume.languages %}
        <li>
            <span class="list-bullet">• </span><span class="list-text"><strong>{{ item.language }}</strong>{% if item.fluency %}: {{ item.fluency }}{% endif %}</span>
        </li>
        {% endfor %}
    </ul>
</section>
{% endif %}
