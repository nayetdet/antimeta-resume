{% if resume.interests %}
<section id="interests" class="resume-section" aria-labelledby="interests-heading">
    <h2 id="interests-heading">Interesses</h2>
    <ul class="item">
        {% for item in resume.interests %}
        <li>
            <span class="list-bullet">• </span><span class="list-text"><strong>{{ item.name }}</strong>{% if item.keywords %}: {{ item.keywords | join(', ') }}{% endif %}</span>
        </li>
        {% endfor %}
    </ul>
</section>
{% endif %}
