{% from 'partials/item.html' import render_item with context %}

{% if resume.references %}
<section id="references" class="resume-section" aria-labelledby="references-heading">
    <h2 id="references-heading">{{ i18n.sections.references }}</h2>
    {% for item in resume.references %}
    {% call render_item(
        title=item.name
    ) %}
    <div class="reference-text">“{{ item.reference }}”</div>
    {% endcall %}
    {% endfor %}
</section>
{% endif %}
